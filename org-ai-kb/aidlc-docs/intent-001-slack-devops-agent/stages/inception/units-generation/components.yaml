Component:
  Id: CMP-004
  Unit: "UNIT-001"   # Slack DevOps Agent (single deployable unit) · internal module: Agent Worker (grounding seam)
  Name: "AWS Knowledge MCP Client"
  Behaviour-summary: "Calls the aws-knowledge-mcp-server tools (documentation search, regional availability) and returns citable AWS documentation sources for grounding. It is the grounding seam — when it returns no source, the answer is marked ungrounded rather than fabricated (A-2)."
  Responsibilities:
    - "Call AWS Knowledge MCP tools to retrieve documentation relevant to the question (FR-6, S-4)"
    - "Return citable sources (title + link + snippet) for incorporation into answers (FR-7, S-5)"
    - "Signal 'no source available' so the orchestrator can mark an answer ungrounded (A-2)"
  Boundaries:
    - "Does NOT decide when grounding is needed or compose the answer (the orchestrator does)"
    - "Does NOT own or operate the aws-knowledge-mcp-server — that is an external dependency"
    - "Does NOT fabricate citations — absence of a source is reported, never invented"
  Source:
    Requirements:
      - FR-6
      - FR-7
    Stories:
      - S-4
      - S-5
  Dependency: []
  # Calls the external aws-knowledge-mcp-server — infrastructure / external dependency,
  # not a component.
  Dependent-Component:
    - Component:
        Id: CMP-002
        Name: "Agent Orchestrator"
        Interaction: "Calls the MCP client to ground answers and obtain citable sources."
  Entities:
    ENT-006:
      Name: "GroundingSource"
      Description: "A citable AWS documentation source returned by an MCP tool call, used to ground and cite an answer. Transient (per request)."
      Attributes:
        - "title"
        - "url"
        - "snippet"
        - "tool-name"

