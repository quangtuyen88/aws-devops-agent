Component:
  Id: CMP-003
  Unit: "UNIT-001"   # Slack DevOps Agent (single deployable unit) · internal module: Inference Provider LIBRARY (Q4 — distinct buildable module, stable interface, NOT a separate deployable unit)
  Name: "Inference Provider"
  Behaviour-summary: "A pluggable abstraction over LLM/SLM inference. It presents a stable, backend-agnostic interface to the orchestrator so the underlying engine (Kiro-backed, with an alternate such as Bedrock) can change without touching agent-core logic. This is the A-1 seam — the highest-risk assumption."
  Responsibilities:
    - "Expose a backend-agnostic 'run inference' operation to the orchestrator (FR-5, S-3)"
    - "Translate orchestrator requests to the configured inference backend and normalise responses"
    - "Surface inference unavailability/errors as a typed failure for the orchestrator's S-19 path"
    - "Report token/usage information so the orchestrator can record it for the cost guardrail"
  Boundaries:
    - "Does NOT decide whether to call inference (the orchestrator does) or enforce the cost budget"
    - "Does NOT run the agent loop or compose answers"
    - "Does NOT own the choice of concrete backend at deploy time — that is resolved in infrastructure-design (A-1)"
  Source:
    Requirements:
      - FR-5
    Stories:
      - S-3
  Dependency: []
  # Calls the external Kiro/Bedrock inference endpoint — that endpoint is infrastructure,
  # not a component.
  Dependent-Component:
    - Component:
        Id: CMP-002
        Name: "Agent Orchestrator"
        Interaction: "Calls the provider to obtain model responses during the agent loop."
  Entities:
    ENT-005:
      Name: "InferenceExchange"
      Description: "One request/response round-trip with the inference backend: the prompt sent and the model output plus usage metadata. Transient."
      Attributes:
        - "prompt-input"
        - "model-output"
        - "token-usage"
        - "backend-id"

