Component:
  Id: CMP-007
  Unit: "UNIT-001"   # Slack DevOps Agent (single deployable unit) · internal module: Operational Data (shared-state boundary CS-1)
  Name: "Operational Data Service"
  Behaviour-summary: "The single owner of the service's durable aggregate state: adoption metrics, helpfulness feedback signals, and the cost-usage counter (the A-8 aggregate-operational-data store, CS-1). Because it owns the cost counter, it also owns the 'is this request within budget?' decision, reading thresholds from Configuration & Policy. It is not conversation memory (OOS-4)."
  Responsibilities:
    - "Record adoption metrics: distinct developers served and questions handled per period (FR-18, S-27)"
    - "Record per-answer 👍/👎 helpfulness signals (FR-16, S-26)"
    - "Maintain the per-period inference/MCP usage counter (NFR-8, S-18)"
    - "Expose a 'within budget?' decision using the counter and the guardrail threshold (NFR-8, S-18)"
  Boundaries:
    - "Does NOT own the guardrail threshold values — it reads them from Configuration & Policy (CMP-008)"
    - "Does NOT own job-control / de-dup state — that is the Job Coordinator (CMP-006)"
    - "Does NOT store conversation memory (OOS-4, A-8) — only aggregate operational data"
    - "Does NOT capture reactions from Slack itself — it receives the signal from the adapter (CMP-001)"
  Source:
    Requirements:
      - FR-16
      - FR-18
      - NFR-8
    Stories:
      - S-18
      - S-26
      - S-27
  Dependency:
    - Component:
        Id: CMP-008
        Name: "Configuration & Policy"
        Interaction: "Reads the guardrail threshold to evaluate the within-budget decision (read-only)."
  Dependent-Component:
    - Component:
        Id: CMP-001
        Name: "Slack Interaction Adapter"
        Interaction: "Forwards captured 👍/👎 reactions to be recorded as feedback signals."
    - Component:
        Id: CMP-002
        Name: "Agent Orchestrator"
        Interaction: "Asks the within-budget decision before spending and records adoption + usage after processing."
  Entities:
    ENT-009:
      Name: "AdoptionMetric"
      Description: "Aggregate adoption counters sufficient to report distinct developers served and questions handled per period. Durable; append/aggregate. Not conversation memory (A-8)."
      Attributes:
        - "period"
        - "distinct-developers"
        - "questions-handled"
    ENT-010:
      Name: "FeedbackSignal"
      Description: "A helpfulness signal recorded against a specific answer for the success metric. Durable; append-mostly."
      Attributes:
        - "answer-ref"
        - "signal"            # positive | negative
        - "recorded-at"
    ENT-011:
      Name: "UsageCounter"
      Description: "Per-period inference/MCP usage tally read on the hot path to enforce the cost guardrail (NFR-8). Durable; correctness-critical."
      Attributes:
        - "period"
        - "usage-count"
        - "last-updated-at"

---

Component:
  Id: CMP-008
  Unit: "UNIT-001"   # Slack DevOps Agent (single deployable unit) · internal module: Configuration & Policy (read-mostly)
  Name: "Configuration & Policy"
  Behaviour-summary: "The single owner of operator-set configuration: the channel allowlist, the published data-sensitivity usage policy, and the cost-guardrail thresholds. These are low-churn, read-mostly settings consumed by other components read-only, giving operators one place to manage all settings (S-15, S-17, S-18)."
  Responsibilities:
    - "Own the channel allowlist operators configure for where the bot answers (FR-2, S-15)"
    - "Own the published data-sensitivity usage policy text (NFR-3, S-17)"
    - "Own the cost-guardrail threshold configuration (NFR-8, S-18)"
  Boundaries:
    - "Does NOT enforce the allowlist (the adapter does), nor count usage or decide budget (the Operational Data Service does)"
    - "Does NOT publish the policy to Slack itself — it holds the policy values consumers read"
    - "Does NOT store runtime/aggregate data — only operator-set configuration"
  Source:
    Requirements:
      - FR-2
      - NFR-3
      - NFR-8
    Stories:
      - S-15
      - S-17
      - S-18
  Dependency: []
  Dependent-Component:
    - Component:
        Id: CMP-001
        Name: "Slack Interaction Adapter"
        Interaction: "Reads the channel allowlist to filter intake."
    - Component:
        Id: CMP-002
        Name: "Agent Orchestrator"
        Interaction: "Reads usage-policy and agent-loop limit settings."
    - Component:
        Id: CMP-007
        Name: "Operational Data Service"
        Interaction: "Reads the guardrail threshold for the within-budget decision."
  Entities:
    ENT-012:
      Name: "ChannelAllowlist"
      Description: "The set of channels in which the bot is permitted to answer (FR-2). Operator-set configuration; read-mostly."
      Attributes:
        - "allowed-channel-ids"
        - "non-allowlisted-behaviour"   # silent | reply-not-designated
    ENT-013:
      Name: "UsagePolicy"
      Description: "The published data-sensitivity policy: only internal/non-production content, no secrets/PII/customer data (NFR-3). Operator-set."
      Attributes:
        - "policy-text"
        - "published-location-ref"
    ENT-014:
      Name: "GuardrailConfig"
      Description: "Operator-set cost-guardrail thresholds (per-request and/or per-period bound) consumed by the Operational Data Service (NFR-8). Concrete values set in nfr-design (A-7)."
      Attributes:
        - "per-request-limit"
        - "per-period-limit"
        - "period-definition"
