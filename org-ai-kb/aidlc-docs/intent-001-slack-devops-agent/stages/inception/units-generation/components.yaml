Component:
  Id: CMP-002
  Unit: "UNIT-001"   # Slack DevOps Agent (single deployable unit) · internal module: Agent Worker (independently scalable, Q3)
  Name: "Agent Orchestrator"
  Behaviour-summary: "The async worker and reasoning core. For each accepted job it reconstructs thread context, runs the safety gate before any external send, checks the cost budget, then iterates inference and MCP grounding under a tool-call/timeout cap to compose a detailed, cited answer, and drives the job to a resolved or failure-resolved state. It owns 'how the answer is reasoned about', not Slack transport, secret-detection rules, durable counters, or configuration values."
  Responsibilities:
    - "Reconstruct thread-scoped conversation context from fetched replies for the agent loop (FR-4, CS-6)"
    - "Invoke the safety gate on assembled input BEFORE any inference or MCP call (CS-4 ordering)"
    - "Ask the Operational Data Service whether the request is within the cost budget, and route a denial to the failure path (NFR-8, S-18, S-19)"
    - "Iterate inference + MCP grounding under a hard tool-call/timeout cap to produce a grounded answer (FR-5, FR-6, FR-7, CS-5)"
    - "Compose the detailed answer: recommendation, rationale, trade-offs, alternative, and citations (FR-8, S-7..S-12)"
    - "Drive job state transitions and resolve inference/MCP failures and oversized input with a clear in-thread message (FR-17, FR-21, S-19, S-22)"
    - "Record adoption metrics and inference/MCP usage after processing (FR-18, S-27)"
  Boundaries:
    - "Does NOT own the ProcessingJob state machine or de-dup identity — it asks the Job Coordinator (CMP-006) to transition state"
    - "Does NOT talk to Slack directly — all Slack I/O goes through the Slack Interaction Adapter (CMP-001)"
    - "Does NOT own the secret-detection rules — it delegates to the Input Safety Scanner (CMP-005)"
    - "Does NOT own durable counters/metrics or decide the budget threshold — it asks the Operational Data Service (CMP-007)"
    - "Does NOT pick the inference backend or call the MCP server directly — it uses the Inference Provider (CMP-003) and MCP Client (CMP-004) abstractions"
  Source:
    Requirements:
      - FR-4
      - FR-5
      - FR-6
      - FR-7
      - FR-8
      - FR-9
      - FR-10
      - FR-11
      - FR-12
      - FR-13
      - FR-17
      - FR-18
      - FR-21
    Stories:
      - S-3
      - S-4
      - S-5
      - S-7
      - S-8
      - S-9
      - S-10
      - S-11
      - S-12
      - S-13
      - S-19
      - S-22
      - S-27
  Dependency:
    - Component:
        Id: CMP-001
        Name: "Slack Interaction Adapter"
        Interaction: "Fetches thread replies to reconstruct context, and posts the answer / failure-resolution message into the originating thread."
    - Component:
        Id: CMP-005
        Name: "Input Safety Scanner"
        Interaction: "Submits assembled input for secret/credential scanning and honours warn/refuse BEFORE any inference or MCP send (CS-4)."
    - Component:
        Id: CMP-007
        Name: "Operational Data Service"
        Interaction: "Asks 'may I proceed within budget?' before spending, and records adoption metrics + usage after processing (NFR-8, FR-18)."
    - Component:
        Id: CMP-003
        Name: "Inference Provider"
        Interaction: "Obtains model responses through the pluggable inference abstraction during the agent loop (FR-5)."
    - Component:
        Id: CMP-004
        Name: "AWS Knowledge MCP Client"
        Interaction: "Calls AWS Knowledge MCP tools to ground answers and obtain citable sources (FR-6, FR-7)."
    - Component:
        Id: CMP-006
        Name: "Job Coordinator"
        Interaction: "Transitions the job seen → in-progress → resolved and signals failure-resolution; relies on it for in-flight recovery (CS-2, CS-3)."
    - Component:
        Id: CMP-008
        Name: "Configuration & Policy"
        Interaction: "Reads usage-policy and agent-loop limit settings to shape processing (read-only)."
  Dependent-Component: []
  # Triggered asynchronously by the message queue (infrastructure) on the intake→worker
  # handoff (C-1/C-4). The queue is not a component, so no component lists CMP-002 as a
  # synchronous dependency — this is the deliberate async boundary, not a missing edge.
  Entities:
    ENT-003:
      Name: "ConversationContext"
      Description: "Thread-scoped working memory for the agent loop, reconstructed from fetched Slack replies at request time. Ephemeral — never persisted to a durable cross-session store (A-8, OOS-4, CS-6)."
      Attributes:
        - "thread-ts"
        - "ordered-messages"
        - "assembled-prompt-input"
        - "within-size-budget"   # FR-21 / A-9
    ENT-004:
      Name: "Answer"
      Description: "The composed response to a question: recommendation plus rationale, trade-offs, optional alternative, and the citations gathered from grounding. Transient (produced per request, posted via CMP-001)."
      Attributes:
        - "correlation-id"       # same canonical request id as the originating InboundMention / ProcessingJob.job-id; makes FeedbackSignal.answer-ref unambiguous and threads the answer back to its request (DA-1)
        - "recommendation"
        - "rationale"
        - "trade-offs"
        - "alternatives"
        - "citations"
        - "is-grounded"          # false ⇒ explicitly marked ungrounded (A-2)
        - "code-snippets"        # IaC/code blocks where requested (FR-13)

