Component:
  Id: CMP-005
  Unit: "UNIT-001"   # Slack DevOps Agent (single deployable unit) · internal module: Agent Worker (pre-send safety gate, CS-4)
  Name: "Input Safety Scanner"
  Behaviour-summary: "The pre-send safety gate. It inspects assembled input for secrets, credentials, keys, and tokens and returns a verdict (allow / warn / refuse). Its detection rules evolve on their own cadence (A-6), independent of the agent loop. By contract it runs before any input reaches inference or MCP (CS-4)."
  Responsibilities:
    - "Detect likely secrets/credentials/keys/tokens in assembled input (FR-15, S-16)"
    - "Return a verdict that lets the caller warn and/or refuse rather than process normally (FR-15)"
    - "Guarantee flagged input can be blocked before forwarding to inference or MCP (NFR-4, CS-4)"
  Boundaries:
    - "Does NOT post messages to Slack or decide the user-facing wording (the orchestrator/adapter do)"
    - "Does NOT call inference or MCP — it only judges input"
    - "Does NOT own configuration; detection rules/patterns are its internal concern (A-6)"
  Source:
    Requirements:
      - FR-15
      - NFR-4
    Stories:
      - S-16
  Dependency: []
  Dependent-Component:
    - Component:
        Id: CMP-002
        Name: "Agent Orchestrator"
        Interaction: "Submits assembled input for scanning and acts on the verdict before any external send (CS-4)."
  Entities:
    ENT-007:
      Name: "SafetyVerdict"
      Description: "The outcome of scanning one input: whether secrets were detected, what was matched (redacted), and the recommended action. Transient."
      Attributes:
        - "flagged"
        - "findings"          # redacted match descriptors — never raw secret values (NFR-6)
        - "recommended-action"  # allow | warn | refuse

