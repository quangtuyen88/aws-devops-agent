# =============================================================================
# FUNCTIONAL-DESIGN EXPANSION (appended 2026-06-17, construction/UNIT-001)
# Owner: aidlc-systems-architect-agent
# -----------------------------------------------------------------------------
# The component blocks ABOVE are copied forward from units-generation UNCHANGED —
# every CMP/ENT id, name, behaviour, dependency, and Unit ownership is preserved
# verbatim (no domain drift). This appendix expands each component IN PLACE with
# references to the functional artifacts produced this stage (entities.yaml,
# rules.yaml, functional-spec.md workflows/state-machine, api-specification.md).
# It ADDS references only; it does not alter any blueprint value.
#
# Refinements flagged this stage (expansions of blueprint values, not renames):
#   R-1 (Q2=b): ENT-008.status enum expanded in place seen|in-progress|resolved
#               → seen|in-progress|resolved|failed (distinct failed terminal).
#   R-2 (Q3=a): ENT-008.slack-event-identity defined as composite (channel-id,
#               message-ts).
#   R-3 (Q4=b): ENT-010 (FeedbackSignal) fixed as an append-only event log;
#               attributes reactor-id + event-action added; success metric =
#               latest-per-(answer,reactor,signal). Cardinality Answer 1:N FeedbackSignal.
#   R-4 (F-1, PM contribution): aggregation key refined to (answer,reactor,SIGNAL)
#               so a withdrawn 👎 does not erase a still-present 👍 — BR-020.
#   R-5 (F-2, PM contribution): ENT-004.answer-type added so BR-015 branches on a
#               modelled, verifiable field (set before composition in W2).
#   R-6 (F-3, PM contribution): ENT-012.non-allowlisted-behaviour default flipped
