Component:
  Id: CMP-006
  Unit: "UNIT-001"   # Slack DevOps Agent (single deployable unit) · internal module: Job/State (shared-state boundary CS-1)
  Name: "Job Coordinator"
  Behaviour-summary: "Owns the lifecycle of an async processing job created by the intake→worker split (C-1/C-4). It models de-duplication as at-most-once *completed* processing (seen / in-progress / resolved, CS-3) and detects jobs acked but lost before completion so they are retried or failure-resolved (CS-2). It owns job-control state; it does not reason about the answer."
  Responsibilities:
    - "Register an incoming Slack event by identity and report whether processing should start (de-dup, FR-19, S-20)"
    - "Model the job state machine: seen → in-progress → resolved (CS-3)"
    - "Guarantee at-most-once *completed* processing so a crashed-before-answer job can be reprocessed (CS-2, CS-3)"
    - "Detect acked-but-incomplete jobs (worker loss/restart) for retry-or-resolve (CS-2, S-19)"
  Boundaries:
    - "Does NOT own the message queue or its datastore — those are infrastructure dependencies"
    - "Does NOT reason about answers, call inference/MCP, or talk to Slack"
    - "Does NOT own adoption/feedback/cost state — that is the Operational Data Service (CMP-007)"
  Source:
    Requirements:
      - FR-19
    Stories:
      - S-19
      - S-20
      - S-24
  Dependency: []
  # Persists ProcessingJob state in a durable datastore (e.g. DynamoDB) — infrastructure,
  # not a component. Whether it shares a physical store with CMP-007 is an
  # infrastructure-design decision, not a domain one.
  Dependent-Component:
    - Component:
        Id: CMP-001
        Name: "Slack Interaction Adapter"
        Interaction: "On intake, registers the event and checks de-dup before acking/enqueuing."
    - Component:
        Id: CMP-002
        Name: "Agent Orchestrator"
        Interaction: "Transitions job state through processing and triggers in-flight recovery on failure/loss."
  Entities:
    ENT-008:
      Name: "ProcessingJob"
      Description: "A unit of async work for one originating Slack mention, with the de-dup identity and the state machine that guarantees at-most-once-completed processing and in-flight recovery. Durable (part of the CS-1 shared-state boundary)."
      Attributes:
        - "job-id"
        - "slack-event-identity"   # de-dup key (CS-3)
        - "originating-message-ref"
        - "status"                 # seen | in-progress | resolved
        - "attempt-count"
        - "last-transition-at"

