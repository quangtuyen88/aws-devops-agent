# INFRASTRUCTURE-DESIGN EXPANSION (appended 2026-06-17, construction/UNIT-001)
# Owner: aidlc-systems-architect-agent
# -----------------------------------------------------------------------------
# Everything ABOVE is copied forward from functional-design/components.yaml
# UNCHANGED — every CMP/ENT id, name, behaviour, dependency, Unit ownership, and
# the Functional-Design-Refs appendix are preserved verbatim (no domain drift).
# This appendix ADDS the physical AWS mapping per component. It references the
# concrete decisions in infrastructure-specification.md; it does not alter any
# blueprint value. Human decisions applied: Q1=a, Q2=both-backends, Q3=a,
# Q4=a, Q5=a, Q6=a (questions.md 2026-06-17T14:13:37+08:00).
#
# Cloud baseline: AWS, single region, single account family; region/account
# parameterised in Terraform. IaC=Terraform (manual apply, OOS-3). Sink=CloudWatch.
# Secrets=AWS Secrets Manager. At-rest=KMS (CMK on jobs/opdata/config + secrets).
# =============================================================================

Infrastructure-Design-Refs:

  CMP-001:
    name: "Slack Interaction Adapter"
    runtime_role: "intake (always-on) + outbound (runs in worker)"
    compute: "API Gateway HTTP API + intake Lambda (no VPC, 512MB, 10s timeout, provisioned concurrency 2). Inbound reaction_added/reaction_removed events (W4/FR-16) route to the SAME intake Lambda and are handled SYNCHRONOUSLY (F2) — never enqueued to SQS, never reach the worker"
    storage: "writes ProcessingJob (dedup register) via CMP-006; (F2) ALSO appends FeedbackSignal to OperationalData (CMP-007/API-INT-007) on the inbound reaction path — append-only (BR-018/BR-020/R-3)"
    network: "PUBLIC ingress (only exposed endpoint); Slack signature verified at intake for BOTH mention and reaction events"
    iam_role: "intake-lambda-role — sqs:SendMessage(queue), dynamodb:PutItem/GetItem(ProcessingJob), dynamodb:PutItem+Query/GetItem(OperationalData, F2 — append FeedbackSignal + resolve answer-message-ts→correlation-id; no UpdateItem), secretsmanager:GetSecretValue(slack/*)"
    secrets: ["slack/signing-secret", "slack/bot-token"]
    observability: "ack-latency histogram (EMF) verifies NFR-1; correlation-id stamped at intake"
    deployment: "compute-intake Terraform module"
    nfr: [NFR-1, NFR-6, NFR-7]

  CMP-002:
    name: "Agent Orchestrator"
    runtime_role: "worker (horizontally scalable)"
    compute: "SQS-triggered worker Lambda (VPC private subnets, 1024MB, 45s timeout, reserved concurrency 15, event-source batch_size=1, max concurrency 12)"
    storage: "reads/writes ProcessingJob (lease) + OperationalData (usage/adoption)"
    network: "in-VPC; egress via NAT (Slack/MCP) + interface endpoints (Bedrock/Secrets/KMS/SQS) + gateway endpoint (DynamoDB); internal ALB to kiro-gateway"
    iam_role: "worker-lambda-role (see infrastructure-specification.md §4.2)"
    observability: "full-answer latency histogram, failure-by-cause, concurrency gauge (EMF)"
    deployment: "compute-worker Terraform module"
    timing_invariant: "NFR-17 budget 30s < Lambda 45s < SQS visibility 90s == lease staleness 90s (INCLUSIVE >= reclaim check, F5); maxReceiveCount 3"
    nfr: [NFR-2, NFR-9, NFR-10, NFR-11, NFR-12, NFR-16, NFR-17]

  CMP-003:
    name: "Inference Provider (library)"
    runtime_role: "in-process library inside worker Lambda (A-1 swap seam, API-INT-001)"
    inference_backend_primary: "Kiro via self-hosted kiro-gateway (ECS Fargate, internal ALB, OpenAI/Anthropic-compatible HTTP, bearer PROXY_API_KEY)"
    inference_backend_alternate: "Amazon Bedrock Converse/InvokeModel via boto3 (same CMP-003 interface)"
    compute_dependency: "kiro-gateway = ECS Fargate service (baseline 2 tasks across 2 AZs, autoscale 2->4), private subnets, internal ALB TLS; stateful (each task holds/refreshes its own Kiro SSO token). (F4) raised 1->2 to remove the single-point-of-failure for the PRIMARY inference path"
    availability_class: "(F4) OWN infrastructure for the NFR-9 error budget — token-refresh/task/AZ failures count against OUR budget, not the dependency exclusion; only the upstream Kiro/Bedrock model backends + MCP remain dependency-side"
    failover: "(F4) Kiro->Bedrock is a CONFIG/DEPLOY-TIME manual switch (backend-id in Config), NOT automatic per-request; on breaker-open jobs fail gracefully (FR-17) until an operator cuts over. In-band resilience comes from the Multi-AZ baseline, not Bedrock"
    secrets: ["inference/kiro-gateway-proxy-key", "inference/kiro-sso-credentials (kiro-gateway task only)"]
    iam: "Bedrock path uses bedrock:InvokeModel/Converse on SPECIFIC model ARNs (worker role); kiro-gateway-task-role has secrets-only, NO data-plane perms"
    licensing_watch_item: "kiro-gateway is AGPL-3.0 — network use = distribution; NOT silently accepted; deploy unmodified to bound copyleft; Bedrock-primary is the fallback via this seam. Resurface at code-generation."
    observability: "per-backend breaker-state gauge (NFR-16)"
    nfr: [NFR-9, NFR-16, NFR-5]

  CMP-004:
    name: "AWS Knowledge MCP Client"
    runtime_role: "in-process library inside worker Lambda"
    external_dependency: "hosted remote aws-knowledge-mcp-server over HTTPS (Q5=a) — no infra to operate"
    network: "outbound HTTPS via NAT Gateway; egress allowlist may pin the MCP domain"
    secrets: ["mcp/aws-knowledge-credential"]
    iam: "secretsmanager:GetSecretValue(mcp/*) on worker role"
    observability: "MCP breaker-state gauge + timeout (NFR-16/17)"
    nfr: [NFR-7, NFR-16, NFR-17]

  CMP-005:
    name: "Input Safety Scanner"
    runtime_role: "in-process library inside worker Lambda — runs BEFORE any egress (CS-4)"
    compute: "no external service; pure in-process gate"
    network: "n/a (no network); positioned ahead of all kiro-gateway/Bedrock/MCP calls"
    observability: "failure-by-cause=safety-refuse counter; findings logged as CLASS only (NFR-6)"
    nfr: [NFR-4, NFR-6, NFR-21]

  CMP-006:
    name: "Job Coordinator"
    runtime_role: "intake + worker (logic); state in DynamoDB"
    storage: "DynamoDB ProcessingJob table — PK slack-event-identity (= channel-id#message-ts), the CS-3 dedup key; conditional PutItem with attribute_not_exists(slack-event-identity) for at-most-once-completed dedup (F1). job-id is a stamped IMMUTABLE uuid attribute (== correlation-id, DA-1), NOT the PK and NOT derived from channel#message-ts (optional GSI on job-id for correlation-id lookup); conditional UpdateItem on the same item for single-winner in-progress lease (status + attempt-count + last-transition-at, BR-027); KMS CMK at rest"
    queue: "Amazon SQS Standard (C-1, API-INT-009) + DLQ; visibility 90s; maxReceiveCount 3"
    recovery: "SQS redelivery + per-delivery lease-staleness (90s) check with INCLUSIVE >= comparison (F5, primary); EventBridge-scheduled reaper Lambda (no VPC) drains DLQ, marks abandoned jobs failed, and posts the FR-17 in-thread failure message via originating-message-ref + slack/bot-token (F3, backstop)"
    iam: "intake: dynamodb conditional PutItem/GetItem on ProcessingJob + sqs:SendMessage. worker: dynamodb UpdateItem/GetItem/Query on ProcessingJob (lease) + sqs receive/delete. reaper-lambda-role (F3): dynamodb:UpdateItem/Query on ProcessingJob, sqs receive/delete on DLQ only, secretsmanager:GetSecretValue on slack/bot-token, logs/metrics — NO data-plane perms beyond ProcessingJob"
    observability: "recovery/abandon counters (NFR-19/20)"
    nfr: [NFR-19]

  CMP-007:
    name: "Operational Data Service"
    runtime_role: "worker (usage/adoption) + intake (FeedbackSignal append, F2)"
    storage: "DynamoDB OperationalData table — UsageCounter via atomic ADD (BR-019, no lost update), FeedbackSignal append, AdoptionMetric aggregate; KMS CMK at rest"
    iam: "worker role: dynamodb:UpdateItem/PutItem/Query on OperationalData. intake role (F2): dynamodb:PutItem (append FeedbackSignal, BR-020) + Query/GetItem (answer-ref resolution) on OperationalData — no UpdateItem (feedback is append-only)"
    observability: "usage counter + degrade count + adoption counters (EMF, NFR-13/20)"
    nfr: [NFR-13, NFR-20]

  CMP-008:
    name: "Configuration & Policy"
    runtime_role: "read-mostly by all roles"
    storage: "DynamoDB Config table — ChannelAllowlist, UsagePolicy, GuardrailConfig (per-request/per-period limits), input-token budget (12000 in / 4000 out, NFR-14); KMS CMK at rest"
    iam: "dynamodb:GetItem/Query (read-only) on Config for intake + worker roles"
    operator_access: "operators edit config out-of-band (console/CLI/IaC); read-mostly, low churn"
    nfr: [NFR-3, NFR-5]

# C-1 internal async seam (API-INT-009) physical realisation:
#   Amazon SQS Standard queue + DLQ. Producer = intake Lambda (CMP-001),
#   consumer = worker Lambda (CMP-002). correlation-id propagated as an SQS
#   message attribute for end-to-end NFR-20 tracing. The queue is infrastructure,
#   not a component — unchanged from the blueprint.

