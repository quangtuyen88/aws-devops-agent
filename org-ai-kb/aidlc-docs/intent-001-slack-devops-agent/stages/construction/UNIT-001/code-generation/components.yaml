# Component Catalogue (copied forward into units-generation)
# Intent: Slack DevOps Agent Bot (intent-001-slack-devops-agent)
# Source of truth: domain-design/components.yaml. Copied here UNCHANGED except for an
# added `Unit:` ownership reference on each component (units-generation). All IDs,
# names, behaviours, dependencies, and entity names are preserved verbatim — no
# domain drift.
#
# units-generation decision (human answers 2026-06-17T11:39:24+08:00):
#   Q1=a — ALL 8 components ship as ONE deployable unit, UNIT-001 (modular monolith);
#          the C-1 intake→worker async boundary is an INTERNAL seam. contract-design
#          stays skipped (no cross-unit contracts).
#   Q3=b — the worker path (CMP-002 + CMP-003/004/005) is designed to scale
#          horizontally INDEPENDENTLY of intake (CMP-001) WITHIN the single unit
#          (multiple worker instances drain the internal queue); C-1 is preserved as a
#          clean future extraction seam. Runtime mechanism is infrastructure-design.
#   Q4=a — CMP-003 (Inference Provider, the A-1 seam) is packaged as a distinct
#          buildable library/MODULE with a stable interface (swap Kiro↔Bedrock, test in
#          isolation) — a MODULE boundary inside UNIT-001, NOT a separate deployable unit.
# See units.md for the per-unit detail and internal module structure.
#
# Stage: domain-design (inception) · Owner: aidlc-app-architect-agent
# Decomposition: balanced 8-component catalogue, CMP-001..CMP-008
# (human answer 2026-06-17T10:25:36+08:00 — "agree to all" on questions.md Q1..Q6).
# Refined 2026-06-17 against aidlc-systems-architect-agent-contribution.md:
# DA-1 applied in place — correlation-id added to ENT-001 (InboundMention) and
# ENT-004 (Answer) as the canonical end-to-end request id (== ProcessingJob.job-id).
# DA-2..DA-7 are downstream design concerns (functional/nfr/infrastructure-design),
# not component changes — recorded in components.md "Refinement" + "Notes" sections.
# Logical building blocks only. Deployment grouping (single unit per A-4/C-4)
# is decided at units-generation. Infrastructure (Slack API, Kiro/Bedrock
# endpoint, aws-knowledge-mcp-server, the message queue, the durable datastore)
# is a DEPENDENCY of these components, not a component.

Component:
  Id: CMP-001
  Unit: "UNIT-001"   # Slack DevOps Agent (single deployable unit) · internal module: Intake/Adapter
  Name: "Slack Interaction Adapter"
  Behaviour-summary: "Owns the Slack boundary in both directions. Inbound: validates Slack events, parses @mentions, filters non-allowlisted channels and bot/self messages, and fetches thread replies on demand. Outbound: posts the acknowledgement, the final answer, and failure messages back into the originating thread, and captures helpfulness reactions. It is transport and content-shaping only — it does not reason about answers or own durable state."
  Responsibilities:
    - "Validate inbound Slack events and parse the @mention into a captured question (FR-1)"
    - "Filter intake against the channel allowlist; stay silent or reply with the not-designated message for non-allowlisted channels (FR-2, S-14)"
    - "Ignore the bot's own and other bots' messages even when they mention the bot (FR-20, S-21)"
    - "Post the in-thread acknowledgement within the Slack synchronous window (FR-3, NFR-1)"
    - "Fetch thread replies on request so the orchestrator can reconstruct conversation context (FR-4, CS-6 fetch-not-store)"
    - "Render and post the full answer and failure/retry messages into the originating thread, formatted for Slack (FR-14, FR-17, S-6)"
    - "Capture 👍/👎 reactions on an answer and forward the helpfulness signal for recording (FR-16, S-25)"
  Boundaries:
    - "Does NOT decide whether a job is a duplicate — it asks the Job Coordinator (CMP-006)"
    - "Does NOT own the channel allowlist values — it reads them from Configuration & Policy (CMP-008)"
    - "Does NOT run the agent loop, call inference, or call MCP — that is the Agent Orchestrator (CMP-002)"
    - "Does NOT own durable feedback/adoption state — it forwards the raw reaction to the Operational Data Service (CMP-007)"
    - "Does NOT own the message queue — that is infrastructure the intake path enqueues onto"
  Source:
    Requirements:
      - FR-1
      - FR-2
      - FR-3
      - FR-4
      - FR-14
      - FR-16
      - FR-17
      - FR-20
      - NFR-1
    Stories:
      - S-1
      - S-2
      - S-6
      - S-14
      - S-21
      - S-25
  Dependency:
    - Component:
        Id: CMP-008
        Name: "Configuration & Policy"
        Interaction: "Reads the channel allowlist to enforce FR-2/S-14 at intake (read-only)."
    - Component:
        Id: CMP-006
        Name: "Job Coordinator"
        Interaction: "On a valid mention, registers the originating event and asks whether it is a new job (at-most-once-completed de-dup, CS-3) before acking and enqueuing."
    - Component:
        Id: CMP-007
        Name: "Operational Data Service"
        Interaction: "Forwards a captured 👍/👎 reaction so the helpfulness signal is recorded against the answer (FR-16, S-26)."
  Dependent-Component:
    - Component:
        Id: CMP-002
        Name: "Agent Orchestrator"
        Interaction: "Calls the adapter to fetch thread replies (context reconstruction) and to post the answer, acknowledgement-resolving failure messages, into the thread."
  Entities:
    ENT-001:
      Name: "InboundMention"
      Description: "A parsed, accepted mention of the bot — the captured question and the Slack coordinates needed to answer it. Transient (per-request); not durable."
      Attributes:
        - "correlation-id"   # canonical end-to-end request id; equals ProcessingJob.job-id (CMP-006), stamped at intake and propagated across the C-1 async boundary for tracing + NFR-6 log hygiene (DA-1)
        - "channel-id"
        - "thread-ts"
        - "message-ts"
        - "author-id"
        - "is-bot-author"
        - "raw-text"
        - "slack-retry-num"
    ENT-002:
      Name: "ReactionEvent"
      Description: "A captured 👍/👎 reaction on a posted answer at the Slack boundary, before it is recorded as a durable feedback signal. Transient."
      Attributes:
        - "answer-message-ts"
        - "reactor-id"
        - "reaction-kind"   # positive | negative

